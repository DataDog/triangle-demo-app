apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simulation.fullname" . }}
  labels:
    app: {{ include "simulation.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "simulation.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "simulation.name" . }}
    spec:
      containers:
        - name: simulation
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: {{ .Values.env.MONGO_URI | quote }}
            - name: MONGO_DB
              value: {{ .Values.env.MONGO_DB | quote }}
            - name: OTEL_SERVICE_NAME
              value: "simulation-service"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: LOCATOR_URL
              value: {{ .Values.env.LOCATOR_URL | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

