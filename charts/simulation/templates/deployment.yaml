apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simulation.fullname" . }}
  labels:
    {{- include "simulation.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "simulation.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simulation.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- if .Values.opentelemetry.enabled }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.opentelemetry.serviceName | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ range $key, $value := .Values.opentelemetry.resourceAttributes }}{{ $key }}={{ $value }},{{ end }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.exporter.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.opentelemetry.exporter.protocol | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.opentelemetry.traces.exporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.opentelemetry.metrics.exporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.opentelemetry.logs.exporter | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.opentelemetry.traces.sampler | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            {{- if and (eq $key "MONGO_USERNAME") (empty $value) }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: MONGO_USERNAME
            {{- else if and (eq $key "MONGO_PASSWORD") (empty $value) }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: mongodb-auth
                  key: MONGO_PASSWORD
            {{- else }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
            initialDelaySeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3

