apiVersion: v1
kind: Service
metadata:
  name: {{ include "simulation.fullname" . }}
  labels:
    {{- include "simulation.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  selector:
    {{- include "simulation.selectorLabels" . | nindent 4 }}
