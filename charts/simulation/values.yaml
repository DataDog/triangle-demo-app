replicaCount: 1

image:
  repository: simulation
  tag: local
  pullPolicy: Never

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# OpenTelemetry Configuration
opentelemetry:
  enabled: true
  serviceName: simulation
  exporter:
    endpoint: otel-collector:4317
    protocol: grpc
  traces:
    exporter: "otlp"
    sampler: "parentbased_always_on"
  metrics:
    exporter: "otlp"
  logs:
    exporter: "otlp"
  resourceAttributes:
    service.name: "simulation"

# Application Environment Variables
env:
  LOCATOR_URL: "http://locator:8000/bundle"
  MONGO_AUTH_SOURCE: "admin"
  MONGO_DB: "triangle"
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_USERNAME: "" # Will be set from secret
  MONGO_PASSWORD: "" # Will be set from secret
