apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector-config.yaml: |
    receivers:
      otlp/http:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "*"
              allowed_headers:
                - "*"
      filelog:
        include:
          - /var/log/pods/*/*.log
          - /var/log/containers/*.log
        start_at: beginning
        include_file_path: true
        include_file_name: false
        operators:
          - type: json_parser
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: remove
            field: attributes.time
          - type: add
            field: attributes.ddsource
            value: python
          - type: add
            field: attributes.ddtags
            value: env:production

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      attributes:
        actions:
          - key: deployment.environment
            value: production
            action: insert
      resource:
        attributes:
          - key: service.namespace
            value: triangle
            action: insert
      k8sattributes:
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
          - sources:
              - from: connection

    exporters:
      datadog:
        api:
          key: ${DD_API_KEY}
          site: ${DD_SITE}
        metrics:
          endpoint: "https://api.${DD_SITE}.datadoghq.com/api/v2/metrics"
        logs:
          endpoint: "https://http-intake.logs.${DD_SITE}.datadoghq.com/api/v2/logs"
        traces:
          endpoint: "https://trace.agent.${DD_SITE}.datadoghq.com"
      debug:
        verbosity: detailed
      logging:
        sampling_initial: 1
        sampling_thereafter: 1
        loglevel: debug

    service:
      telemetry:
        logs:
          level: debug
          development: true
          encoding: console
      pipelines:
        traces:
          receivers: [otlp/http]
          processors: [batch, attributes, resource, k8sattributes]
          exporters: [datadog, debug, logging]
        metrics:
          receivers: [otlp/http]
          processors: [batch, attributes, resource, k8sattributes]
          exporters: [datadog, debug, logging]
        logs:
          receivers: [filelog]
          processors: [batch, attributes, resource, k8sattributes]
          exporters: [datadog, debug, logging]
