apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: {{ .Values.global.namespace | default "default" }}
spec:
  global:
    site: {{ .Values.global.datadog.site | quote }}
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
  features:
    apm:
      enabled: true
    otlp:
      receiver:
        protocols:
          grpc:
            enabled: true
            endpoint: "0.0.0.0:4317"
          http:
            enabled: true
            endpoint: "0.0.0.0:4318"
    dogstatsd:
      portEnabled: true
    logCollection:
      enabled: true
    liveProcessCollection:
      enabled: true
    liveContainerCollection:
      enabled: true
    processDiscovery:
      enabled: true
    kubeStateMetricsCore:
      enabled: true
  override:
    clusterAgent:
      replicas: 1
    nodeAgent:
      tolerations:
        - operator: Exists
