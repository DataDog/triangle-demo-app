receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: "datadog-agent"
          scrape_interval: 10s
          static_configs:
            - targets:
                - 0.0.0.0:8888
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
exporters:
  debug:
    verbosity: detailed
  datadog:
    api:
      key: $DD_API_KEY
      site: $DD_SITE
processors:
  infraattributes:
    cardinality: 2
  batch:
    timeout: 10s
connectors:
  datadog/connector:
    traces:
      compute_top_level_by_span_kind: true
      peer_tags_aggregation: true
      compute_stats_by_span_kind: true
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [infraattributes, batch]
      exporters: [debug, datadog, datadog/connector]
    metrics:
      receivers: [otlp, datadog/connector, prometheus]
      processors: [infraattributes, batch]
      exporters: [debug, datadog]
    logs:
      receivers: [otlp]
      processors: [infraattributes, batch]
      exporters: [debug, datadog]
