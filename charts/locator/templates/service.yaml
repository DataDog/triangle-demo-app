apiVersion: v1
kind: Service
metadata:
  name: {{ include "locator.fullname" . }}
  labels:
    {{- include "locator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  selector:
    {{- include "locator.selectorLabels" . | nindent 4 }}
