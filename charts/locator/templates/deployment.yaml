apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "locator.fullname" . }}
  labels:
    {{- include "locator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "locator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "locator.selectorLabels" . | nindent 8 }}
    spec:
      shareProcessNamespace: true
      containers:
        - name: locator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              value: {{ .Values.env.MONGO_URI | quote }}
            - name: OTEL_SERVICE_NAME
              value: "locator-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
        - name: otel-auto-instrumentation
          image: otel/autoinstrumentation-go:latest
          imagePullPolicy: Always
          env:
            - name: OTEL_GO_AUTO_TARGET_EXE
              value: "/app/locator"
            - name: OTEL_SERVICE_NAME
              value: "locator-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
          securityContext:
            privileged: true
          volumeMounts:
            - name: app-volume
              mountPath: /app
      volumes:
        - name: app-volume
          emptyDir: {}
