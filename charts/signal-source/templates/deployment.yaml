apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signal-source.fullname" . }}
  labels:
    {{- include "signal-source.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "signal-source.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "signal-source.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            - name: MONGO_HOST
              value: {{ .Values.env.MONGO_HOST | quote }}
            - name: MONGO_USERNAME
              value: {{ .Values.env.MONGO_USERNAME | quote }}
            - name: MONGO_PASSWORD
              value: {{ .Values.env.MONGO_PASSWORD | quote }}
            - name: MONGO_DB
              value: {{ .Values.env.MONGO_DB | quote }}
            - name: SIMULATION_URL
              value: {{ .Values.env.SIMULATION_URL | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.opentelemetry.serviceName | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name={{ .Values.opentelemetry.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.exporter.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.opentelemetry.exporter.protocol | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.opentelemetry.traces.exporter | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.opentelemetry.metrics.exporter | quote }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ .Values.opentelemetry.logs.exporter | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.opentelemetry.traces.sampler | quote }}
            - name: OTEL_PYTHON_INSTRUMENTATION_ENABLED
              value: {{ .Values.opentelemetry.instrumentation.enabled | quote }}
            - name: OTEL_PYTHON_FASTAPI_INSTRUMENTATION_ENABLED
              value: {{ .Values.opentelemetry.instrumentation.enabled | quote }}
            - name: OTEL_PYTHON_HTTPX_INSTRUMENTATION_ENABLED
              value: {{ .Values.opentelemetry.instrumentation.enabled | quote }}
            - name: OTEL_PYTHON_PYMONGO_INSTRUMENTATION_ENABLED
              value: {{ .Values.opentelemetry.instrumentation.enabled | quote }}
