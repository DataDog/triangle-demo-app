apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "signal-source.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ include "signal-source.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "signal-source.name" . }}
    spec:
      containers:
        - name: signal-source
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          envFrom:
            - secretRef:
                name: mongodb-secret
            - configMapRef:
                name: mongodb-config

          env:
            - name: MONGO_USERNAME
              value: {{ .Values.env.MONGO_USERNAME | quote }}
            - name: MONGO_PASSWORD
              value: {{ .Values.env.MONGO_PASSWORD | quote }}
            - name: MONGO_DB
              value: {{ .Values.env.MONGO_DB | quote }}
            - name: SIMULATION_URL
              value: {{ .Values.env.SIMULATION_URL | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.OTEL_SERVICE_NAME | quote }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ .Values.env.OTEL_TRACES_EXPORTER | quote }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ .Values.env.OTEL_METRICS_EXPORTER | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_PROTOCOL | quote }}
            - name: OTEL_PROPAGATORS
              value: {{ .Values.env.OTEL_PROPAGATORS | quote }}
            - name: OTEL_SDK_DISABLED
              value: {{ .Values.env.OTEL_SDK_DISABLED | quote }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.env.OTEL_TRACES_SAMPLER | quote }}
            - name: RUST_LOG
              value: "debug"
            - name: RUST_BACKTRACE
              value: "1"

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
